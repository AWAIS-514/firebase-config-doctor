apply plugin: 'com.android.application'

android {
    compileSdkVersion 33

    defaultConfig {
        applicationId "com.dummyrnapp"
        minSdkVersion 21
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation 'com.google.firebase:firebase-bom:32.0.0'
}

// Firebase plugin — must be at the bottom of build.gradle
apply plugin: 'com.google.gms.google-services'
